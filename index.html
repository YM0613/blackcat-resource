<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mod.黑猫 资源库</title>
    <style>
        :root {
            --bg-start: #f8f1f5;
            --bg-mid: #f7eef2;
            --bg-end: #f5eef3;
            --panel: rgba(255, 247, 250, 0.92);
            --panel-strong: rgba(255, 247, 250, 0.98);
            --text-main: #27222b;
            --text-soft: #746d76;
            --line: rgba(147, 129, 145, 0.12);
            --shadow: 0 12px 28px rgba(112, 98, 112, 0.08);
            --hero-a: #f1e6ed;
            --hero-b: #eee2ea;
            --hero-c: #e8dde6;
            --orange: linear-gradient(135deg, #ff8a00, #ffb347);
            --pink: linear-gradient(135deg, #ff4d6d, #ff85a1);
            --blue: linear-gradient(135deg, #4b7bff, #72d6ff);
            --green: linear-gradient(135deg, #00b894, #55efc4);
            --purple: linear-gradient(135deg, #7b61ff, #b287ff);
            --gold: linear-gradient(135deg, #ffb703, #ffd166);
            --ink: linear-gradient(135deg, #2d3250, #465284);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            padding: 20px 14px 36px;
            color: var(--text-main);
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.98), transparent 30%),
                radial-gradient(circle at top right, rgba(242, 228, 236, 0.85), transparent 30%),
                linear-gradient(135deg, var(--bg-start), var(--bg-mid) 52%, var(--bg-end));
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            border-radius: 999px;
            filter: blur(12px);
            opacity: 0.45;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 180px;
            height: 180px;
            top: 90px;
            left: -40px;
            background: rgba(238, 226, 234, 0.85);
        }

        body::after {
            width: 240px;
            height: 240px;
            right: -80px;
            bottom: 130px;
            background: rgba(236, 228, 234, 0.75);
        }

        .app {
            position: relative;
            z-index: 1;
            width: min(100%, 1120px);
            margin: 0 auto;
        }

        .hero {
            position: relative;
            overflow: hidden;
            padding: 24px 20px 20px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            border-radius: 28px;
            background: linear-gradient(145deg, rgba(252, 247, 250, 0.98), rgba(247, 239, 244, 0.96));
            box-shadow: var(--shadow);
            animation: rise-in 0.7s ease-out;
            text-align: center;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: -40% auto auto 50%;
            width: 240px;
            height: 240px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(233, 219, 228, 0.9), transparent 65%);
            transform: translateX(-30%);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: auto 6% -60px auto;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 226, 233, 0.9), transparent 62%);
            pointer-events: none;
        }

        .hero-badge {
            display: inline-block;
            padding: 2px 6px;
            color: transparent;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ff7aa8, #a77dff 48%, #65b7ff);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: 0 0 10px rgba(255, 122, 168, 0.18), 0 0 18px rgba(101, 183, 255, 0.12);
            margin: 0 auto;
            text-align: center;
        }

        .hero-badge::before,
        .hero-badge::after {
            content: none;
        }

        .hero h1 {
            margin-top: 14px;
            font-size: 42px;
            line-height: 1.05;
            letter-spacing: 1px;
            text-shadow: 0 8px 18px rgba(95, 84, 96, 0.08);
        }

        .hero p {
            margin-top: 12px;
            max-width: 720px;
            margin-left: auto;
            margin-right: auto;
            color: var(--text-soft);
            font-size: 14px;
            line-height: 1.7;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-top: 14px;
        }

        .stat {
            padding: 10px 12px 9px;
            border-radius: 16px;
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(10px);
            text-align: left;
        }

        .stat strong {
            display: block;
            font-size: 15px;
            margin-bottom: 3px;
        }

        .stat span {
            color: var(--text-soft);
            font-size: 11px;
            line-height: 1.45;
        }

        .section {
            position: relative;
            overflow: hidden;
            margin-top: 18px;
            padding: 18px;
            border-radius: 24px;
            border: 1px solid rgba(218, 205, 214, 0.5);
            background: var(--panel-strong);
            box-shadow: var(--shadow);
            animation: rise-in 0.7s ease-out both;
            isolation: isolate;
        }

        .section::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.35;
            z-index: 0;
        }

        .section > * {
            position: relative;
            z-index: 1;
        }

        .section:nth-of-type(2) { animation-delay: 0.08s; }
        .section:nth-of-type(3) { animation-delay: 0.12s; }
        .section:nth-of-type(4) { animation-delay: 0.16s; }
        .section:nth-of-type(5) { animation-delay: 0.2s; }
        .section:nth-of-type(6) { animation-delay: 0.24s; }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 14px;
            text-align: center;
        }

        .section-title {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0.5px;
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.65), 0 0 22px rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .section-title::before {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            box-shadow: 0 8px 18px rgba(34, 27, 58, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.35);
            -webkit-text-stroke: 0.35px rgba(255, 255, 255, 0.45);
            text-shadow: none;
        }

        .section-title::after {
            content: "";
            position: absolute;
            inset: 0 auto 0 -35%;
            width: 30%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            transform: skewX(-22deg);
            opacity: 0.7;
            animation: title-sweep 3.8s ease-in-out infinite;
            pointer-events: none;
        }

        .section-tip {
            font-size: 12px;
            color: var(--text-soft);
        }

        .section-tip:empty {
            display: none;
        }

        .section-forum .section-title { color: #2d2930; }
        .section-forum .section-tip { color: #7c747d; }
        .section-forum { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-forum .section-title::before { content: "🔥"; background: linear-gradient(135deg, #2f2a31, #4d454e); }
        .section-forum::before { background: radial-gradient(circle at 14% 18%, rgba(227, 216, 223, 0.7), transparent 18%), linear-gradient(135deg, rgba(214, 201, 210, 0.16) 25%, transparent 25%) 0 0 / 18px 18px; }

        .section-software .section-title { color: #2d2930; }
        .section-software .section-tip { color: #7c747d; }
        .section-software { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-software .section-title::before { content: "💾"; background: linear-gradient(135deg, #2f2a31, #4d454e); }
        .section-software::before { background: radial-gradient(circle at 82% 24%, rgba(229, 220, 226, 0.7), transparent 20%), linear-gradient(90deg, rgba(214, 201, 210, 0.14) 1px, transparent 1px) 0 0 / 18px 18px, linear-gradient(rgba(214, 201, 210, 0.14) 1px, transparent 1px) 0 0 / 18px 18px; }

        .section-tools .section-title { color: #2d2930; }
        .section-tools .section-tip { color: #7c747d; }
        .section-tools { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-tools .section-title::before { content: "🛠"; background: linear-gradient(135deg, #2f2a31, #4d454e); }
        .section-tools::before { background: radial-gradient(circle at 18% 24%, rgba(229, 220, 226, 0.7), transparent 18%), linear-gradient(45deg, rgba(214, 201, 210, 0.14) 12.5%, transparent 12.5%, transparent 50%, rgba(214, 201, 210, 0.14) 50%, rgba(214, 201, 210, 0.14) 62.5%, transparent 62.5%, transparent) 0 0 / 18px 18px; }

        .section-apk .section-title { color: #2d2930; }
        .section-apk .section-tip { color: #7c747d; }
        .section-apk { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-apk .section-title::before { content: "📦"; background: linear-gradient(135deg, #2f2a31, #4d454e); }
        .section-apk::before { background: radial-gradient(circle at 80% 18%, rgba(229, 220, 226, 0.7), transparent 18%), linear-gradient(135deg, rgba(214, 201, 210, 0.14) 25%, transparent 25%, transparent 50%, rgba(214, 201, 210, 0.14) 50%, rgba(214, 201, 210, 0.14) 75%, transparent 75%, transparent) 0 0 / 20px 20px; }

        .section-keyword .section-title { color: #2d2930; }
        .section-keyword .section-tip { color: #7c747d; }
        .section-keyword { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-keyword .section-title::before { content: "🔎"; background: linear-gradient(135deg, #2f2a31, #4d454e); }
        .section-keyword::before { background: radial-gradient(circle at 12% 20%, rgba(229, 220, 226, 0.7), transparent 16%), linear-gradient(0deg, rgba(214, 201, 210, 0.14) 2px, transparent 2px) 0 0 / 16px 16px; }

        .section-ad .section-title { color: #2d2930; }
        .section-ad .section-tip { color: #7c747d; }
        .section-ad { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-ad .section-title::before { content: "📢"; background: linear-gradient(135deg, #2f2a31, #4d454e); }

        .section-protect .section-title { color: #2d2930; }
        .section-protect .section-tip { color: #7c747d; }
        .section-protect { background: linear-gradient(180deg, rgba(249, 243, 247, 0.98), rgba(248, 241, 245, 0.96)); border-color: rgba(214, 200, 210, 0.48); }
        .section-protect .section-title::before { content: "🛡"; background: linear-gradient(135deg, #2f2a31, #4d454e); }
        .section-protect::before { background: radial-gradient(circle at 18% 20%, rgba(229, 220, 226, 0.65), transparent 18%), linear-gradient(135deg, rgba(214, 201, 210, 0.14) 25%, transparent 25%, transparent 50%, rgba(214, 201, 210, 0.14) 50%, rgba(214, 201, 210, 0.14) 75%, transparent 75%, transparent) 0 0 / 18px 18px; }

        .section-forum .card-rank,
        .section-tools .card-rank,
        .section-apk .card-rank,
        .section-protect .card-rank,
        .action-card .card-rank {
            color: rgba(255, 255, 255, 0.88);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 14px;
        }

        .card {
            position: relative;
            overflow: hidden;
            min-height: 142px;
            border: none;
            border-radius: 24px;
            padding: 18px 16px 16px;
            color: #2d2930;
            text-align: left;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(112, 98, 112, 0.08);
            transition: transform 0.28s ease, box-shadow 0.28s ease, filter 0.28s ease;
            isolation: isolate;
            border: 1px solid rgba(219, 207, 215, 0.52);
        }

        .card-icon {
            position: absolute;
            top: 18px;
            left: 16px;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0;
            color: #1f1b23;
            background: transparent;
            border: none;
            box-shadow: none;
            font-size: 0;
            z-index: 2;
        }

        .card-icon::before {
            content: "";
            width: 26px;
            height: 26px;
            display: block;
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
        }

        .card-badge,
        .card-rank {
            display: none;
        }

        .card-rank {
            position: absolute;
            right: 12px;
            bottom: 12px;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 0.8px;
            color: rgba(255, 255, 255, 0.86);
            text-transform: uppercase;
            text-shadow: 0 4px 12px rgba(27, 18, 52, 0.24);
            z-index: 2;
        }

        .section-keyword .card-rank {
            color: rgba(74, 49, 0, 0.82);
        }

        .card-ripple {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(195, 184, 192, 0.36);
            pointer-events: none;
            z-index: 1;
            animation: ripple-burst 0.68s ease-out forwards;
        }

        .card::before {
            content: "";
            position: absolute;
            inset: auto -20px -30px auto;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: rgba(230, 219, 226, 0.52);
        }

        .card::selection {
            background: rgba(255, 255, 255, 0.2);
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent 45%);
            pointer-events: none;
        }

        .card > * {
            position: relative;
            z-index: 2;
        }

        .card:hover,
        .card:active {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 24px rgba(112, 98, 112, 0.12);
            filter: brightness(1.01);
        }

        .card small,
        .action-card small {
            display: none;
        }

        .card strong,
        .action-card strong {
            display: block;
            margin-top: 42px;
            font-size: 15px;
            line-height: 1.22;
            font-weight: 700;
        }

        .action-card {
            position: relative;
            overflow: hidden;
            isolation: isolate;
        }

        .action-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 45%);
            pointer-events: none;
        }

        .action-card > * {
            position: relative;
            z-index: 2;
        }

        .action-card .card-icon {
            width: 30px;
            height: 30px;
            font-size: 0;
        }

        .action-card .card-badge {
            background: rgba(24, 20, 43, 0.32);
        }

        .card span,
        .action-card span {
            display: block;
            margin-top: 8px;
            font-size: 11px;
            line-height: 1.45;
            opacity: 1;
        }

        .theme-orange,
        .theme-pink,
        .theme-blue,
        .theme-green,
        .theme-purple,
        .theme-gold,
        .theme-ink {
            color: #2d2930;
            background: linear-gradient(135deg, #f3eaf0, #f1e8ee 52%, #eee3ea);

    <script>
        const AUTHOR_QQ = "3350330594";

        function openLink(url) {
            if (window.plus && plus.runtime && /^https?:/i.test(url)) {
                plus.runtime.openURL(url);
                return;
            }
            window.location.href = url;
        }

        function showToast(title, desc, type) {
            const toast = document.getElementById("toast");
            const toastIcon = document.getElementById("toastIcon");
            const toastTitle = document.getElementById("toastTitle");
            const toastDesc = document.getElementById("toastDesc");
            toast.classList.remove("toast-copy", "toast-link");
            if (type) {
                toast.classList.add(type);
            }
            toastIcon.textContent = type === "toast-link" ? "↗" : "✓";
            toastTitle.textContent = title;
            toastDesc.textContent = desc || "";
            toast.classList.add("show");
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                toast.classList.remove("show");
            }, 2200);
        }

        function fallbackCopy(text) {
            const input = document.createElement("input");
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand("copy");
            document.body.removeChild(input);
        }

        function copyText(text, successText) {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast("复制成功", successText, "toast-copy");
                }).catch(() => {
                    fallbackCopy(text);
                    showToast("复制成功", successText, "toast-copy");
                });
                return;
            }
            fallbackCopy(text);
            showToast("复制成功", successText, "toast-copy");
        }

        function copyAuthorQQ() {
            copyText(AUTHOR_QQ, "作者QQ已复制：" + AUTHOR_QQ);
        }

        function bindCardEffects() {
            document.querySelectorAll(".card").forEach((card) => {
                card.addEventListener("click", (event) => {
                    const oldRipple = card.querySelector(".card-ripple");
                    if (oldRipple) {
                        oldRipple.remove();
                    }
                    const ripple = document.createElement("span");
                    ripple.className = "card-ripple";
                    const rect = card.getBoundingClientRect();
                    ripple.style.left = (event.clientX - rect.left) + "px";
                    ripple.style.top = (event.clientY - rect.top) + "px";
                    card.appendChild(ripple);
                    ripple.addEventListener("animationend", () => ripple.remove(), { once: true });
                });
            });
        }

        window.addEventListener("load", () => {
            bindCardEffects();
        });
    </script>
